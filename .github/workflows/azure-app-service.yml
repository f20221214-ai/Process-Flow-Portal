name: Deploy to Azure App Service

# Free-tier friendly: ONE Web App (F1), no Azure DB, no service principal.
# Uses Publish Profile auth — only 2 GitHub secrets required.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm config set ignore-scripts true && pnpm install --frozen-lockfile && pnpm config set ignore-scripts false

      - name: Build API and frontend
        env:
          PORT: "8080"
          BASE_PATH: "/"
          NODE_ENV: production
        run: |
          pnpm --filter @workspace/api-server build
          pnpm --filter @workspace/arc-portal build

      - name: Package for Azure (single app)
        run: |
          mkdir -p deploy-package/dist deploy-package/public
          cp -r artifacts/api-server/dist/* deploy-package/dist/
          cp -r artifacts/arc-portal/dist/public/* deploy-package/public/
          printf '%s\n' \
            '{' \
            '  "name": "arc-portal",' \
            '  "private": true,' \
            '  "type": "module",' \
            '  "engines": { "node": ">=22" },' \
            '  "scripts": { "start": "node dist/index.mjs" }' \
            '}' > deploy-package/package.json

      - name: Apply database schema (Neon / external Postgres)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL not set — skip schema (add GitHub secret to enable)"
            exit 0
          fi
          pnpm db:schema

      - name: Seed demo data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ "${{ vars.SEED_DEMO_DATA }}" != "true" ] || [ -z "$DATABASE_URL" ]; then
            echo "Skipping seed"
            exit 0
          fi
          pnpm seed:all

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy-package

      - name: Health check
        continue-on-error: true
        run: |
          sleep 30
          curl -fsS "https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/healthz"
