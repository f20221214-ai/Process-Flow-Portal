# Local production-like stack (requires Azure PostgreSQL or any external Postgres)
services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/api.Dockerfile
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      LOG_LEVEL: info
      AI_INTEGRATIONS_OPENAI_BASE_URL: ${AI_INTEGRATIONS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_INTEGRATIONS_OPENAI_API_KEY: ${AI_INTEGRATIONS_OPENAI_API_KEY:-}
      LEANIX_WORKSPACE: ${LEANIX_WORKSPACE:-}
      LEANIX_API_TOKEN: ${LEANIX_API_TOKEN:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  portal:
    build:
      context: ../..
      dockerfile: deploy/docker/portal.Dockerfile
    environment:
      API_UPSTREAM: http://api:8080
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_healthy
