openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Architecture Review Process Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: requests
  - name: sessions
  - name: outcomes
  - name: jira
  - name: leanix
  - name: knowledge-base
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /requests:
    get:
      operationId: listRequests
      tags: [requests]
      summary: List all ARRs
      responses:
        "200":
          description: List of architecture review requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArchitectureRequest"
    post:
      operationId: createRequest
      tags: [requests]
      summary: Submit a new ARR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArchitectureRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureRequest"

  /requests/{id}:
    get:
      operationId: getRequest
      tags: [requests]
      summary: Get a specific ARR
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Architecture review request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureRequest"
    patch:
      operationId: updateRequest
      tags: [requests]
      summary: Update ARR status or details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateArchitectureRequest"
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureRequest"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all ARC sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArcSession"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Schedule a new ARC session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArcSession"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArcSession"

  /sessions/{id}:
    patch:
      operationId: updateSession
      tags: [sessions]
      summary: Update session details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateArcSession"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArcSession"

  /outcomes:
    get:
      operationId: listOutcomes
      tags: [outcomes]
      summary: List all review outcomes
      responses:
        "200":
          description: List of outcomes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewOutcome"
    post:
      operationId: createOutcome
      tags: [outcomes]
      summary: Record a review outcome
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewOutcome"
      responses:
        "201":
          description: Created outcome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewOutcome"

  /jira/initiatives:
    get:
      operationId: listJiraInitiatives
      tags: [jira]
      summary: List JIRA initiatives
      responses:
        "200":
          description: List of JIRA initiatives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JiraInitiative"

  /jira/sync:
    post:
      operationId: syncJiraInitiatives
      tags: [jira]
      summary: Trigger simulated JIRA sync
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JiraSyncResult"

  /leanix/initiatives:
    get:
      operationId: listLeanixInitiatives
      tags: [leanix]
      summary: List LeanIX initiatives
      responses:
        "200":
          description: List of LeanIX initiatives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeanixInitiative"

  /leanix/sync:
    post:
      operationId: syncLeanixInitiatives
      tags: [leanix]
      summary: Trigger LeanIX sync from API
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeanixSyncResult"

  /knowledge-base:
    get:
      operationId: listKbArticles
      tags: [knowledge-base]
      summary: List all knowledge base articles
      responses:
        "200":
          description: List of KB articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KbArticle"
    post:
      operationId: createKbArticle
      tags: [knowledge-base]
      summary: Create a knowledge base article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKbArticle"
      responses:
        "201":
          description: Created article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KbArticle"

  /knowledge-base/{id}:
    get:
      operationId: getKbArticle
      tags: [knowledge-base]
      summary: Get a specific KB article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: KB article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KbArticle"
    patch:
      operationId: updateKbArticle
      tags: [knowledge-base]
      summary: Update a KB article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKbArticle"
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KbArticle"
    delete:
      operationId: deleteKbArticle
      tags: [knowledge-base]
      summary: Delete a KB article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /requests/{requestId}/kb-articles:
    get:
      operationId: listRequestKbArticles
      tags: [knowledge-base]
      summary: List KB articles linked to a request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of linked KB articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KbArticle"
    post:
      operationId: linkKbArticleToRequest
      tags: [knowledge-base]
      summary: Link a KB article to a request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                articleId:
                  type: integer
              required: [articleId]
      responses:
        "201":
          description: Created link

  /requests/{requestId}/kb-articles/{articleId}:
    delete:
      operationId: unlinkKbArticleFromRequest
      tags: [knowledge-base]
      summary: Remove a KB article link from a request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
        - name: articleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LeanixInitiative:
      type: object
      properties:
        id:
          type: integer
        leanixId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        lifecycle:
          type: string
          nullable: true
        status:
          type: string
        responsible:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        leanixUrl:
          type: string
          nullable: true
        syncedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, leanixId, name, status, tags, syncedAt, createdAt]

    LeanixSyncResult:
      type: object
      properties:
        synced:
          type: integer
        added:
          type: integer
        updated:
          type: integer
        lastSyncedAt:
          type: string
          format: date-time
      required: [synced, added, updated, lastSyncedAt]

    JiraInitiative:
      type: object
      properties:
        id:
          type: integer
        jiraKey:
          type: string
        summary:
          type: string
        description:
          type: string
          nullable: true
        projectKey:
          type: string
        projectName:
          type: string
        status:
          type: string
        priority:
          type: string
        assignee:
          type: string
          nullable: true
        issueType:
          type: string
        labels:
          type: array
          items:
            type: string
        jiraUrl:
          type: string
          nullable: true
        syncedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, jiraKey, summary, projectKey, projectName, status, priority, issueType, labels, syncedAt, createdAt]

    JiraSyncResult:
      type: object
      properties:
        synced:
          type: integer
        added:
          type: integer
        updated:
          type: integer
        lastSyncedAt:
          type: string
          format: date-time
      required: [synced, added, updated, lastSyncedAt]

    ArchitectureRequest:
      type: object
      properties:
        id:
          type: integer
        # Core
        title:
          type: string
        description:
          type: string
        businessUnit:
          type: string
        submittedBy:
          type: string
        sponsorProductOwner:
          type: string
          nullable: true
        solutionArchitect:
          type: string
          nullable: true
        # Classification
        requestType:
          type: string
          enum: [new_application, major_enhancement, new_capability, cloud_migration, application_replacement, application_decommissioning, technology_selection]
        status:
          type: string
          enum: [submitted, ea_triage, specifications_required, arc_scheduled, arc_review, approved, approved_with_conditions, deferred, rejected]
        priority:
          type: string
          enum: [low, medium, high, critical]
        phase:
          type: string
          nullable: true
        # Business context
        businessContext:
          type: string
          nullable: true
        businessValueHypothesis:
          type: array
          items:
            type: string
            enum: [increased_revenue, reduced_costs, reduced_risk, improved_experience]
        businessCapability:
          type: array
          items:
            type: string
        businessCriticality:
          type: string
          nullable: true
          enum: [mission_critical, business_critical, business_operational, administrative_service]
        costEstimate:
          type: string
          nullable: true
          enum: [small, medium, large, xlarge]
        inScopeRegions:
          type: array
          items:
            type: string
        expectedUserBase:
          type: string
          nullable: true
        deploymentModel:
          type: string
          nullable: true
          enum: [on_prem_datacenter, on_prem_plant, saas, cloud_vendor, cloud_mccain, hybrid, tbd]
        targetGoLiveDate:
          type: string
          nullable: true
        # Impact levels
        securityImpactLevel:
          type: string
          enum: [none, low, medium, high]
        securityImpactDetails:
          type: string
          nullable: true
        dataImpactLevel:
          type: string
          enum: [none, low, medium, high]
        dataImpactDetails:
          type: string
          nullable: true
        integrationImpactLevel:
          type: string
          enum: [none, low, medium, high]
        integrationImpactDetails:
          type: string
          nullable: true
        regulatoryImpactLevel:
          type: string
          enum: [none, low, medium, high]
        regulatoryImpactDetails:
          type: string
          nullable: true
        aiImpactLevel:
          type: string
          enum: [none, low, medium, high]
        aiImpactDetails:
          type: string
          nullable: true
        # Specs
        architectureSpecifications:
          type: string
          nullable: true
        # EA triage
        eaAssignee:
          type: string
          nullable: true
        scopeNotes:
          type: string
          nullable: true
        eaSecurityRiskRating:
          type: string
          nullable: true
        eaDataComplexityRating:
          type: string
          nullable: true
        eaIntegrationComplexityRating:
          type: string
          nullable: true
        eaRegulatoryRiskRating:
          type: string
          nullable: true
        eaAiRiskRating:
          type: string
          nullable: true
        eaOverallComplexity:
          type: string
          nullable: true
        eaOverallRiskLevel:
          type: string
          nullable: true
        eaReviewType:
          type: string
          nullable: true
          enum: [lightweight, standard, deep_dive]
        eaRequiredArchitectureViews:
          type: string
          nullable: true
        eaRequiredSmes:
          type: string
          nullable: true
        eaArcSchedule:
          type: string
          nullable: true
        # JIRA
        jiraInitiativeId:
          type: integer
          nullable: true
        jiraKey:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, description, businessUnit, submittedBy, requestType, status, priority, businessValueHypothesis, businessCapability, inScopeRegions, securityImpactLevel, dataImpactLevel, integrationImpactLevel, regulatoryImpactLevel, aiImpactLevel, createdAt, updatedAt]

    CreateArchitectureRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        businessUnit:
          type: string
        submittedBy:
          type: string
        sponsorProductOwner:
          type: string
          nullable: true
        solutionArchitect:
          type: string
          nullable: true
        requestType:
          type: string
          enum: [new_application, major_enhancement, new_capability, cloud_migration, application_replacement, application_decommissioning, technology_selection]
        priority:
          type: string
          enum: [low, medium, high, critical]
        businessContext:
          type: string
          nullable: true
        businessValueHypothesis:
          type: array
          items:
            type: string
        businessCapability:
          type: array
          items:
            type: string
        businessCriticality:
          type: string
          nullable: true
        costEstimate:
          type: string
          nullable: true
        inScopeRegions:
          type: array
          items:
            type: string
        expectedUserBase:
          type: string
          nullable: true
        deploymentModel:
          type: string
          nullable: true
        targetGoLiveDate:
          type: string
          nullable: true
        securityImpactLevel:
          type: string
        securityImpactDetails:
          type: string
          nullable: true
        dataImpactLevel:
          type: string
        dataImpactDetails:
          type: string
          nullable: true
        integrationImpactLevel:
          type: string
        integrationImpactDetails:
          type: string
          nullable: true
        regulatoryImpactLevel:
          type: string
        regulatoryImpactDetails:
          type: string
          nullable: true
        aiImpactLevel:
          type: string
        aiImpactDetails:
          type: string
          nullable: true
        architectureSpecifications:
          type: string
          nullable: true
        jiraInitiativeId:
          type: integer
          nullable: true
      required: [title, description, businessUnit, submittedBy, requestType, priority]

    UpdateArchitectureRequest:
      type: object
      properties:
        status:
          type: string
          enum: [submitted, ea_triage, specifications_required, arc_scheduled, arc_review, approved, approved_with_conditions, deferred, rejected]
        priority:
          type: string
        eaAssignee:
          type: string
          nullable: true
        scopeNotes:
          type: string
          nullable: true
        architectureSpecifications:
          type: string
          nullable: true
        jiraInitiativeId:
          type: integer
          nullable: true
        eaSecurityRiskRating:
          type: string
          nullable: true
        eaDataComplexityRating:
          type: string
          nullable: true
        eaIntegrationComplexityRating:
          type: string
          nullable: true
        eaRegulatoryRiskRating:
          type: string
          nullable: true
        eaAiRiskRating:
          type: string
          nullable: true
        eaOverallComplexity:
          type: string
          nullable: true
        eaOverallRiskLevel:
          type: string
          nullable: true
        eaReviewType:
          type: string
          nullable: true
        eaRequiredArchitectureViews:
          type: string
          nullable: true
        eaRequiredSmes:
          type: string
          nullable: true
        eaArcSchedule:
          type: string
          nullable: true

    ArcSession:
      type: object
      properties:
        id:
          type: integer
        requestId:
          type: integer
        scheduledDate:
          type: string
          format: date-time
        duration:
          type: integer
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
        attendees:
          type: array
          items:
            type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, requestId, scheduledDate, duration, status, attendees, createdAt]

    CreateArcSession:
      type: object
      properties:
        requestId:
          type: integer
        scheduledDate:
          type: string
          format: date-time
        duration:
          type: integer
        attendees:
          type: array
          items:
            type: string
        notes:
          type: string
          nullable: true
      required: [requestId, scheduledDate, duration, attendees]

    UpdateArcSession:
      type: object
      properties:
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
        notes:
          type: string
          nullable: true
        scheduledDate:
          type: string
          format: date-time

    ReviewOutcome:
      type: object
      properties:
        id:
          type: integer
        requestId:
          type: integer
        sessionId:
          type: integer
          nullable: true
        decision:
          type: string
          enum: [approved, approved_with_conditions, deferred, rejected, escalated]
        outcomeType:
          type: string
          enum: [adr_update, deviation, risk_ownership, lt_escalation, standard]
        adrReference:
          type: string
          nullable: true
        exceptionOwner:
          type: string
          nullable: true
        remediationPlan:
          type: string
          nullable: true
        riskOwner:
          type: string
          nullable: true
        escalationReason:
          type: string
          nullable: true
        nextSteps:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
      required: [id, requestId, decision, outcomeType, createdAt, createdBy]

    CreateReviewOutcome:
      type: object
      properties:
        requestId:
          type: integer
        sessionId:
          type: integer
          nullable: true
        decision:
          type: string
          enum: [approved, approved_with_conditions, deferred, rejected, escalated]
        outcomeType:
          type: string
          enum: [adr_update, deviation, risk_ownership, lt_escalation, standard]
        adrReference:
          type: string
          nullable: true
        exceptionOwner:
          type: string
          nullable: true
        remediationPlan:
          type: string
          nullable: true
        riskOwner:
          type: string
          nullable: true
        escalationReason:
          type: string
          nullable: true
        nextSteps:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdBy:
          type: string
      required: [requestId, decision, outcomeType, createdBy]

    KbArticle:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
          enum: [pattern, reference_architecture, best_practice, external_link]
        tags:
          type: array
          items:
            type: string
        content:
          type: string
        externalUrl:
          type: string
          nullable: true
        owner:
          type: string
        technologies:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [published, draft, archived]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, category, tags, content, owner, technologies, status, createdAt, updatedAt]

    CreateKbArticle:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
          enum: [pattern, reference_architecture, best_practice, external_link]
        tags:
          type: array
          items:
            type: string
        content:
          type: string
        externalUrl:
          type: string
          nullable: true
        owner:
          type: string
        technologies:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [published, draft, archived]
      required: [title, owner]

    UpdateKbArticle:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        content:
          type: string
        externalUrl:
          type: string
          nullable: true
        owner:
          type: string
        technologies:
          type: array
          items:
            type: string
        status:
          type: string
